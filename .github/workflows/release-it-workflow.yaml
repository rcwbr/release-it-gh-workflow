on:
  workflow_call:
    inputs:
      release-it-image:
        description: The release it action to use
        # default: ghcr.io/rcwbr/release-it-docker-conventional-changelog:0.1.0 TODO use semver image ref
        default: ghcr.io/rcwbr/release-it-docker-conventional-changelog:main
        required: false
        type: string
      default-branch:
        description: The branch from which to release on commit
        default: refs/heads/main
        required: false
        type: string
jobs:
  release-it-dry-run:
    name: Release-it dry-run
    runs-on: ubuntu-24.04
    container:
      image: ${{ inputs.release-it-image }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
      -
        name: Release-it
        run: |
          set -e
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com
          git config --global user.name github-actions[bot]
          release-it --ci --config /.release-it.json --changelog | tee $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  release-it:
    name: Release-it
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    # Run full release process for pushes to main
    if: ${{ github.ref == inputs.default-branch }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
      -
        name: Release-it
        run: |
          set -e
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com
          git config --global user.name github-actions[bot]
          release-it --ci --config /.release-it.json | tee $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
